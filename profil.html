<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <link rel="stylesheet" href="css/style_profil.css">
</head>
<body>
    <fieldset class="frame">
        <legend align="center">Profil</legend>
        <div align="center">
            <img src="images/user.png" alt="" ><br>
            <label>upload a profil picture</label>
            <input type="file">
        </div>
        <table align="center">
            <tr>
                <td>
                    <form>
                        <label>User Name</label><br>
                        <input type="text" placeholder="User Name" required minlength="3" maxlength="20"><br><br>
                        <label>Email</label><br>
                        <input type="email" placeholder="Email"><br><br>
                        <label>Phone Number</label><br>
                        <input type="number" placeholder="Phone Number" value="212" required minlength="12"><br><br>
                        <button type="submit">submit</button>
                    </form>
                </td>
            </tr>
        </table>
    </fieldset>
</body>
</html>
